<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'">
<title>Sift — paste a security URL, get a verdict</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500;1,9..144,700;1,9..144,900&family=JetBrains+Mono:wght@400;500;600;700&family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ---------- Sift — paper notebook + retro CRT hybrid ---------- */

:root {
  /* Dispatch original palette */
  --paper: #f0e9d8;
  --paper-deep: #e6dcc4;
  --paper-shadow: rgba(60, 40, 20, 0.08);
  --ink: #1a1612;
  --ink-soft: #4a3f33;
  --ink-faded: #7a6a55;
  --rule: #c9bfa5;
  --tape: #f4e4a8cc;

  --ship: #2f7d3c;     /* deep ink green, like a stamp */
  --ship-bg: #d8e8d2;
  --skim: #b87a1a;     /* amber, mustardy */
  --skim-bg: #f0e0bf;
  --skip: #555048;     /* graphite */
  --skip-bg: #d8d3c8;

  --accent-red: #b8362e;     /* Detection Dispatch red ink */
  --accent-blue: #2c4d8c;
  --accent-green: #4a7d5c;

  /* Code surface — readable, slightly warm dark */
  --code-bg: #1d1b17;
  --code-ink: #e8dfc8;
  --code-comment: #8a7d65;
  --code-key: #d4a85c;
  --code-str: #9bb87c;
  --code-num: #c08a7c;

  --serif: "Fraunces", "Times New Roman", Georgia, serif;
  --hand: "Caveat", "Bradley Hand", "Comic Sans MS", cursive;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, Consolas, monospace;
  --sans: "Inter", system-ui, -apple-system, sans-serif;

  --headline: var(--serif);
  --paper-tex: 1;
  --crt-tex: 1;
}

/* Palettes */
[data-palette="muted"] {
  --paper: #ebe6d5;
  --ship: #5a7a5e;
  --skim: #a08555;
  --skip: #6a6358;
  --accent-red: #8a4a44;
  --accent-blue: #4a5d7c;
}
[data-palette="contrast"] {
  --paper: #f5efde;
  --ink: #0d0a06;
  --ship: #1f5d2c;
  --skim: #c46a0a;
  --skip: #2a2520;
  --accent-red: #c12818;
  --accent-blue: #1a3d8a;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Paper texture — base + ruled lines + warm gradient + crumple + fibers + stains + vignette */
.paper-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 90% 70% at 50% 30%, rgba(255, 248, 224, 0.6) 0%, transparent 70%),
    linear-gradient(180deg, #f3ecda 0%, #ede4cd 50%, #e6dcc0 100%);
}
.paper-bg::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to bottom, transparent 0, transparent 30px, rgba(85, 110, 145, 0.18) 30px, rgba(85, 110, 145, 0.18) 31px, transparent 31px);
  background-size: 100% 31px;
  opacity: calc(0.7 * var(--paper-tex));
}
.paper-bg::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 12% 22%, rgba(160, 110, 50, 0.08) 0, transparent 14%),
    radial-gradient(circle at 88% 18%, rgba(140, 90, 40, 0.06) 0, transparent 10%),
    radial-gradient(circle at 78% 82%, rgba(170, 120, 60, 0.07) 0, transparent 16%),
    radial-gradient(circle at 8% 75%, rgba(150, 100, 50, 0.05) 0, transparent 12%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 250, 230, 0.25) 0%, transparent 60%);
  opacity: var(--paper-tex);
}
.paper-fiber {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: calc(0.7 * var(--paper-tex));
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.30  0 0 0 0 0.22  0 0 0 0 0.12  0 0 0 0.22 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}
.paper-crumple {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: calc(0.55 * var(--paper-tex));
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><filter id='c'><feTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='2' seed='5' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.35  0 0 0 0 0.25  0 0 0 0 0.12  0 0 0 0.35 0'/></filter><rect width='100%' height='100%' filter='url(%23c)'/></svg>");
  background-size: 800px 800px;
}
.paper-specks {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: calc(0.4 * var(--paper-tex));
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><circle cx='42' cy='88' r='0.7' fill='%23332010' opacity='0.5'/><circle cx='180' cy='44' r='0.5' fill='%23332010' opacity='0.4'/><circle cx='312' cy='208' r='0.8' fill='%23332010' opacity='0.5'/><circle cx='88' cy='280' r='0.6' fill='%23332010' opacity='0.4'/><circle cx='256' cy='340' r='0.5' fill='%23332010' opacity='0.4'/><circle cx='370' cy='112' r='0.4' fill='%23332010' opacity='0.4'/><circle cx='150' cy='200' r='0.7' fill='%23332010' opacity='0.4'/><circle cx='340' cy='60' r='0.5' fill='%23332010' opacity='0.3'/></svg>");
}

.paper-bg .vignette {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% -10%, rgba(40, 25, 10, 0.22) 0, transparent 55%),
    radial-gradient(ellipse at 50% 120%, rgba(40, 25, 10, 0.28) 0, transparent 60%),
    radial-gradient(ellipse 120% 100% at 50% 50%, transparent 55%, rgba(40, 25, 10, 0.18) 100%);
}

.left-margin-rule {
  position: fixed;
  left: 84px; top: 0; bottom: 0;
  width: 1px;
  background: rgba(184, 54, 46, 0.45);
  pointer-events: none;
  z-index: 1;
}
@media (max-width: 720px) {
  .left-margin-rule { left: 32px; }
}

.holes {
  position: fixed;
  left: 28px; top: 0; bottom: 0;
  width: 22px;
  display: flex; flex-direction: column;
  justify-content: space-evenly;
  pointer-events: none;
  z-index: 1;
}
.holes .h {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(0,0,0,0.18) 0, rgba(0,0,0,0.08) 60%, transparent 70%),
              radial-gradient(circle, #d6cab0 0, #b8ab8c 80%);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.4),
              inset 0 -1px 2px rgba(0,0,0,0.25);
}
@media (max-width: 720px) { .holes { display: none; } }

.app {
  position: relative;
  z-index: 2;
  max-width: 980px;
  margin: 0 auto;
  padding: 36px 56px 120px 120px;
}
@media (max-width: 720px) {
  .app { padding: 24px 24px 80px 56px; }
}

.masthead {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 12px;
  margin-bottom: 6px;
}
.masthead .wm {
  display: flex; align-items: baseline; gap: 12px;
}
.masthead .wm .logo {
  font-family: var(--headline);
  font-weight: 900;
  font-size: 56px;
  letter-spacing: -2px;
  line-height: 0.9;
  color: var(--ink);
  font-style: italic;
  position: relative;
}
.masthead .wm .logo::after {
  content: "v0.2";
  position: absolute;
  top: -4px;
  right: -36px;
  font-family: var(--hand);
  font-style: normal;
  font-size: 18px;
  color: var(--accent-red);
  transform: rotate(-6deg);
}
.masthead .wm .tag {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--ink-faded);
  text-transform: uppercase;
}
.masthead .meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faded);
  text-align: right;
  letter-spacing: 0.05em;
}
.masthead .meta .dot { color: var(--ship); }

.subhead {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 56px;
  display: flex; gap: 18px; flex-wrap: wrap;
}
.subhead span { display: inline-flex; align-items: center; gap: 6px; }
.subhead .glyph {
  width: 6px; height: 6px;
  background: var(--accent-red);
  display: inline-block;
}

.hero {
  margin-top: 36px;
  position: relative;
}
.hero .editorial {
  font-family: var(--headline);
  font-size: 64px;
  line-height: 1.02;
  letter-spacing: -1.5px;
  font-weight: 500;
  color: var(--ink);
  max-width: 720px;
  margin-bottom: 28px;
  text-wrap: balance;
}
.hero .editorial em {
  font-style: italic;
  color: var(--accent-red);
}
.hero .editorial .underline {
  position: relative;
  display: inline-block;
}
.hero .editorial .underline::after {
  content: "";
  position: absolute;
  left: 0; right: -4px; bottom: 4px;
  height: 8px;
  background: rgba(184, 54, 46, 0.28);
  z-index: -1;
  transform: skewX(-6deg);
}
.hero .lede {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-soft);
  max-width: 540px;
  margin-bottom: 40px;
}

.cli {
  position: relative;
  background: rgba(255, 252, 244, 0.55);
  border: 1.5px solid var(--ink);
  border-radius: 2px;
  padding: 18px 20px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--mono);
  font-size: 16px;
  box-shadow:
    2px 2px 0 var(--ink),
    4px 4px 12px rgba(0,0,0,0.08);
  transition: box-shadow 0.15s;
}
.cli:focus-within {
  box-shadow: 2px 2px 0 var(--ink), 4px 4px 16px rgba(0,0,0,0.12),
              0 0 0 3px rgba(184, 54, 46, 0.15);
}
.cli .prompt {
  color: var(--accent-red);
  font-weight: 700;
  user-select: none;
}
.cli input {
  flex: 1;
  border: 0; outline: 0; background: transparent;
  font: inherit;
  color: var(--ink);
  caret-color: var(--accent-red);
  min-width: 0;
}
.cli input::placeholder { color: var(--ink-faded); font-style: italic; }
.cli .hint {
  font-size: 11px;
  color: var(--ink-faded);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.cli .hint kbd {
  font-family: var(--mono);
  background: var(--paper-deep);
  border: 1px solid var(--rule);
  border-bottom-width: 2px;
  border-radius: 3px;
  padding: 1px 6px;
  font-size: 10px;
  color: var(--ink);
}
.cli .run-btn {
  border: 1.5px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 7px 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: transform 0.08s;
}
.cli .run-btn:hover { background: var(--accent-red); border-color: var(--accent-red); }
.cli .run-btn:active { transform: translate(1px, 1px); }

.examples {
  margin-top: 28px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 720px) {
  .examples { grid-template-columns: 1fr; }
}
.example {
  background: rgba(255, 252, 244, 0.7);
  border: 1px dashed var(--ink-faded);
  padding: 14px 16px;
  cursor: pointer;
  text-align: left;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.example:hover {
  background: rgba(255, 252, 244, 0.95);
  border-style: solid;
  border-color: var(--ink);
  transform: translate(-1px, -1px);
}
.example .ex-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  font-weight: 700;
  padding: 2px 7px;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.example .ex-tag[data-v="SHIP"] { background: var(--ship-bg); color: var(--ship); }
.example .ex-tag[data-v="SKIM"] { background: var(--skim-bg); color: var(--skim); }
.example .ex-tag[data-v="SKIP"] { background: var(--skip-bg); color: var(--skip); }
.example .ex-title {
  color: var(--ink);
  font-family: var(--headline);
  font-size: 15px;
  line-height: 1.3;
  font-style: italic;
  font-weight: 500;
  margin-bottom: 6px;
}
.example .ex-source {
  font-size: 10px;
  color: var(--ink-faded);
  letter-spacing: 0.05em;
}
.example .ex-corner {
  position: absolute;
  top: 8px; right: 8px;
  font-family: var(--hand);
  font-size: 16px;
  color: var(--accent-red);
  opacity: 0;
  transform: rotate(-8deg);
  transition: opacity 0.2s;
}
.example:hover .ex-corner { opacity: 1; }

.tape {
  position: absolute;
  background: var(--tape);
  border: 1px solid rgba(180, 150, 80, 0.4);
  box-shadow: 1px 1px 4px rgba(0,0,0,0.1);
  pointer-events: none;
}

[data-crt="on"] body::after {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.0) 0,
    rgba(0,0,0,0.0) 2px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.0) 4px
  );
  mix-blend-mode: multiply;
}

.fetching {
  margin-top: 28px;
  border: 1.5px solid var(--ink);
  background: var(--code-bg);
  color: var(--code-ink);
  font-family: var(--mono);
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
}
.fetching .scan {
  position: absolute;
  left: 0; right: 0; height: 2px;
  background: linear-gradient(to right, transparent, rgba(155, 184, 124, 0.6), transparent);
  animation: scan 1.6s linear infinite;
  pointer-events: none;
}
@keyframes scan {
  0%   { top: 0; }
  100% { top: 100%; }
}
.fetching .lines { font-size: 13px; line-height: 1.7; }
.fetching .lines .ln { display: block; opacity: 0; animation: typeIn 0.3s forwards; }
.fetching .lines .ln .k { color: var(--code-key); }
.fetching .lines .ln .s { color: var(--code-str); }
.fetching .lines .ln .c { color: var(--code-comment); }
@keyframes typeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

.reset-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-soft);
  background: rgba(255,252,244,0.6);
  border: 1px solid var(--ink-faded);
  padding: 10px 14px;
  margin-bottom: 28px;
}
.reset-bar .url {
  color: var(--ink);
  font-weight: 500;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.reset-bar .new-btn {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font: inherit;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
}
.reset-bar .new-btn:hover { background: var(--ink); color: var(--paper); }

.verdict-card {
  position: relative;
  background: rgba(255, 252, 244, 0.85);
  border: 2px solid var(--ink);
  padding: 36px 40px 32px;
  box-shadow:
    4px 4px 0 var(--ink),
    8px 8px 24px rgba(0,0,0,0.12);
  margin-bottom: 32px;
}
.verdict-card .source-line {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faded);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.verdict-card .source-line .domain { color: var(--ink); font-weight: 600; }
.verdict-card .source-line .sep::before { content: "·"; }
.verdict-card .article-title {
  font-family: var(--headline);
  font-size: 36px;
  line-height: 1.1;
  font-weight: 500;
  font-style: italic;
  margin: 0 0 24px;
  color: var(--ink);
  max-width: 75%;
  text-wrap: balance;
}

.stamp {
  position: absolute;
  top: 28px; right: 36px;
  width: 200px; height: 100px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 4px double currentColor;
  border-radius: 8px;
  font-family: var(--headline);
  font-weight: 900;
  font-style: italic;
  color: var(--ship);
  transform: rotate(7deg);
  letter-spacing: 2px;
  user-select: none;
  background: transparent;
  filter: url(#stamp-noise);
  animation: stampIn 0.45s cubic-bezier(.2,1.4,.4,1) backwards;
}
@keyframes stampIn {
  0%   { transform: rotate(7deg) scale(2.2); opacity: 0; }
  60%  { transform: rotate(5deg) scale(0.92); opacity: 0.95; }
  100% { transform: rotate(7deg) scale(1); opacity: 1; }
}
.stamp::before {
  content: "";
  position: absolute; inset: 6px;
  border: 1.5px solid currentColor;
  border-radius: 4px;
  opacity: 0.6;
}
.stamp .label {
  font-size: 44px;
  line-height: 1;
}
.stamp .sub {
  font-family: var(--mono);
  font-style: normal;
  font-size: 9px;
  letter-spacing: 0.3em;
  margin-top: 6px;
  font-weight: 600;
}
.stamp[data-v="SHIP"] { color: var(--ship); }
.stamp[data-v="SKIM"] { color: var(--skim); transform: rotate(-5deg); }
.stamp[data-v="SKIM"] { animation-name: stampInSkim; }
@keyframes stampInSkim {
  0%   { transform: rotate(-5deg) scale(2.2); opacity: 0; }
  60%  { transform: rotate(-3deg) scale(0.92); opacity: 0.95; }
  100% { transform: rotate(-5deg) scale(1); opacity: 1; }
}
.stamp[data-v="SKIP"] { color: var(--skip); transform: rotate(3deg); }
.stamp[data-v="SKIP"] { animation-name: stampInSkip; }
@keyframes stampInSkip {
  0%   { transform: rotate(3deg) scale(2.2); opacity: 0; }
  60%  { transform: rotate(2deg) scale(0.92); opacity: 0.95; }
  100% { transform: rotate(3deg) scale(1); opacity: 1; }
}

@media (max-width: 720px) {
  .stamp { width: 140px; height: 76px; top: 14px; right: 14px; }
  .stamp .label { font-size: 32px; }
  .verdict-card { padding: 18px 18px 20px; }
  .verdict-card .article-title { font-size: 24px; max-width: 100%; margin-top: 80px; }
}

.verdict-card .reasoning {
  font-family: var(--headline);
  font-size: 19px;
  line-height: 1.5;
  font-style: italic;
  color: var(--ink);
  max-width: 700px;
  margin: 8px 0 20px;
  border-left: 3px solid var(--accent-red);
  padding-left: 16px;
}
.verdict-card .meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faded);
  letter-spacing: 0.05em;
  border-top: 1px dashed var(--rule);
  padding-top: 14px;
}
.verdict-card .meta-row .pill {
  background: var(--paper-deep);
  border: 1px solid var(--rule);
  padding: 2px 8px;
  border-radius: 2px;
  color: var(--ink-soft);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.verdict-card .meta-row .conf {
  color: var(--ink);
  font-weight: 600;
}
.verdict-card .meta-row .conf-bar {
  display: inline-block;
  width: 80px; height: 6px;
  background: var(--paper-deep);
  border: 1px solid var(--rule);
  position: relative;
  vertical-align: middle;

  position: fixed;

  to { transform: translateY(0); opacity: 1; }

  content: "";
  position: absolute;
  top: -10px; left: 30px;
  width: 70px; height: 20px;
  background: var(--tape);
  border: 1px solid rgba(180, 150, 80, 0.4);

  border-bottom: 1px solid var(--ink);

  justify-content: space-between;
  align-items: baseline;
}
.settings-hdr h3 {
  font-family: var(--headline);
  font-style: italic;
  font-size: 26px;
  font-weight: 700;

}

.settings-body { padding: 20px 24px 24px; }
.settings-field { margin-bottom: 16px; }
.settings-field label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;

.settings-field input {

  border: 1.5px solid var(--ink);

  font-size: 13px;

  color: var(--ink);
  outline: none;
  box-shadow: 2px 2px 0 var(--ink);

  box-shadow: 2px 2px 0 var(--ink), 0 0 0 3px rgba(184, 54, 46, 0.15);
}
.settings-field .help {
  margin-top: 6px;
  font-family: var(--headline);
  font-style: italic;

.settings-actions button {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 8px 14px;

  border: 1px solid var(--ink);
}
.settings-actions .save {

.settings-actions .save:hover { background: var(--accent-red); border-color: var(--accent-red); }
.settings-actions .clear {

  font-style: italic;
  font-size: 13px;

.lookalikes-list { display: grid; gap: 10px; }

  display: grid;

  gap: 14px;

.lookalike-meta {

.lookalike-meta .gh-link {

}
.lookalike-meta .gh-link:hover {

.lookalike-sources {

.lookalike-sources strong {

.lookalike-empty {

.lookalike-sources .source-pill.canonical {

  <script>
  // Stand-in for the design tool's useTweaks hook.
  window.useTweaks = function(defaults) {
    const { useState } = React;
    const [state, setState] = useState(defaults);
    const setTweak = (key, val) => setState((prev) => ({ ...prev, [key]: val }));
    return [state, setTweak];
  };
  window.TweaksPanel  = ({ children }) => null;
  window.TweakSection = ({ children }) => null;
  window.TweakRadio   = () => null;
  window.TweakToggle  = () => null;

  // Replacement for the claude.ai/design-only window.claude.complete.
  // Forwards the prompt to /api/complete, which is served by server.js
  // (an Anthropic SDK proxy). Canned demos in data.js never hit this path.
  window.claude = {
    async complete(prompt) {
      const res = await fetch("/api/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt }),
      });
      if (!res.ok) {
        const body = await res.text().catch(() => "");
        if (res.status === 503) {
          throw new Error(
            "Live verdict engine isn't configured. Set ANTHROPIC_API_KEY and restart, or try one of the example URLs below."
          );
        }
        throw new Error(`proxy ${res.status}: ${body || res.statusText}`);
      }
      const { text } = await res.json();
      return text;
    },
  };
  </script>
